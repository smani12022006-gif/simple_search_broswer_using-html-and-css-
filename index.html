    <title>My First Browser</title>
    <link rel="stylesheet" href="style.css">
    <script>
        setInterval(function() {
            const now = new Date();
        document.getElementById("clock").innerHTML = now.toLocaleTimeString();
        }, 1000);
    </script>
    <script>
        function darkMode() {
    document.body.classList.toggle("dark");
    }

     </div>
